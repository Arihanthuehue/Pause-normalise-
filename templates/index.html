<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pause Normalizer Demo</title>
</head>
<body>
    <h1>Pause Normalizer</h1>
    <p>Upload an audio file (.mp3, .wav, or .m4a) to trim and normalize all pauses down to the duration of the shortest pause.</p>
    
    <form id="uploadForm" enctype="multipart/form-data">
        <label for="audioFile">Select audio file:</label>
        <input type="file" id="audioFile" name="file" accept=".mp3,.wav,.m4a" required>
        <button type="submit" id="submitBtn">Process</button>
    </form>

    <div id="status" style="margin-top: 15px; font-weight: bold; color: blue;"></div>
    <div id="error" style="margin-top: 15px; font-weight: bold; color: red;"></div>

    <div id="results" style="margin-top: 20px; display: none; border: 1px solid #ccc; padding: 15px;">
        <h2>Processing Results</h2>
        
        <h3>Statistics</h3>
        <p id="summaryText"></p>
        
        <div>
            <h3>Original Audio</h3>
            <audio id="originalPlayer" controls></audio>
        </div>

        <div>
            <h3>Processed Audio</h3>
            <audio id="processedPlayer" controls></audio>
        </div>

        <div style="margin-top: 20px;">
            <a id="downloadLink" href="" download style="font-weight: bold;">Download Processed Audio</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('uploadForm');
        const submitBtn = document.getElementById('submitBtn');
        const statusDiv = document.getElementById('status');
        const errorDiv = document.getElementById('error');
        const resultsDiv = document.getElementById('results');
        const summaryText = document.getElementById('summaryText');
        const originalPlayer = document.getElementById('originalPlayer');
        const processedPlayer = document.getElementById('processedPlayer');
        const downloadLink = document.getElementById('downloadLink');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Reset UI
            statusDiv.textContent = 'Processing...';
            errorDiv.textContent = '';
            resultsDiv.style.display = 'none';
            submitBtn.disabled = true;

            const fileInput = document.getElementById('audioFile');
            const file = fileInput.files[0];
            if (!file) {
                errorDiv.textContent = 'Please select a file.';
                submitBtn.disabled = false;
                statusDiv.textContent = '';
                return;
            }

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/process', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    statusDiv.textContent = 'Processing complete!';
                    
                    // Display stats
                    const stats = data.stats;
                    let summary = `<strong>Number of qualifying pauses detected:</strong> ${stats.num_pauses}<br>`;
                    
                    if (stats.num_pauses > 0) {
                        summary += `<strong>Original durations (ms):</strong> [${stats.original_durations.join(', ')}]<br>`;
                        summary += `<strong>Target pause duration used (ms):</strong> ${stats.target_duration}<br>`;
                    }
                    
                    if (stats.skipped) {
                        summary += `<br><span style="color: brown;"><strong>Notice:</strong> Normalization was skipped because fewer than 2 qualifying pauses were found. Returning unmodified audio.</span>`;
                    }
                    
                    summaryText.innerHTML = summary;

                    // Set players
                    // Append a timestamp to URLs to avoid browser caching of audio files
                    const timestamp = new Date().getTime();
                    originalPlayer.src = `${data.original_url}?t=${timestamp}`;
                    processedPlayer.src = `${data.processed_url}?t=${timestamp}`;
                    downloadLink.href = `${data.processed_url}?t=${timestamp}`;
                    
                    // Show results
                    resultsDiv.style.display = 'block';
                } else {
                    errorDiv.textContent = `Error: ${data.error || 'Unknown error occurred.'}`;
                    statusDiv.textContent = '';
                }
            } catch (err) {
                console.error(err);
                errorDiv.textContent = 'Error: Failed to connect to server or execute process.';
                statusDiv.textContent = '';
            } finally {
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
